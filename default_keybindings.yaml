# Default keybindings (version-controlled).
# On startup, if keybindings.yaml does not exist it is generated from this file.
# Edit keybindings.yaml (gitignored) for your personal preferences, or use the
# in-app KEYBINDINGS editor.
#
# Values are pygame key names without the "K_" prefix (case-insensitive).
# See: https://www.pygame.org/docs/ref/key.html
#
# The command palette opens with CTRL + <open_palette>. Every action can also be
# triggered directly by holding CTRL and pressing its key (e.g. CTRL+C creates).

# Open the command palette (held together with CTRL).
open_palette: space

# Palette actions (used as CTRL+<key>, or pressed alone while the palette is open)
create: n         # create a new item
delete: d         # delete selected item (asks for confirmation)
move_left: left   # move selected item one column left
move_right: right # move selected item one column right
move_up: up       # move selected item up within its column
move_down: down   # move selected item down within its column
point: p          # assign a point value to the selected item
keybindings: k    # open the keybindings editor
view_yaml: y      # view the selected item's raw YAML (CTRL+Y)
new_board: m      # create a new board file (CTRL+B)
switch_board: b   # switch to an existing board file (CTRL+M)
relationships: r  # edit the selected item's relationships (CTRL+R)
select_column: a  # select every item in the focused item's column (CTRL+A)
themes: t         # open the colour theme switcher (CTRL+T)
due_date: w       # set a due date on the selected item (CTRL+W)
search: f         # fuzzy-search items (CTRL+F)

# Confirmation / text dialogs
confirm: return
cancel: escape
