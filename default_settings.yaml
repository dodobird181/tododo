# Default settings (version-controlled).
# On startup, if settings.yaml does not exist it is generated from this file.
# Edit settings.yaml (gitignored) for your personal preferences.

# How item descriptions are displayed on cards:
#   selected -> only the currently selected item shows its description (default)
#   all      -> every item shows its description, always expanded
descriptions: selected

# Maximum height (pixels) for the description field on a card. 0 = no limit.
max_description_height: 300

# Show a small git-author avatar circle on the left of each card. The avatar is a
# coloured monogram of whoever created the item; hover it to see name / email.
git_avatars: true
# Try to load each author's real GitHub profile photo (resolved from their commit
# email via GitHub, cached into the board's authors: registry). Falls back to the
# coloured monogram when there is no match or no network.
avatar_images: true

# Show each item's last-updated time (created / edited / moved):
#   selected -> only on the focused card (default)
#   all      -> on every card
timestamps: selected
# How the absolute time is rendered once it is older than 24h. A normal strftime
# string plus the custom token {th} for the ordinal day (1st, 2nd, ...). Within
# 24h a relative phrase is shown instead ("X minutes ago", "2 hours and 15
# minutes ago"). Note %-I (no-leading-zero hour) and %Z (tz name) are GNU/Linux.
timestamp_format: "%B {th}, %Y at %-I:%M %p (%Z)"

# How concurrent-edit conflicts are auto-resolved when syncing with git:
#   incoming -> the remote side wins on conflicting changes (git merge -X theirs)
#   current  -> your local side wins on conflicting changes (git merge -X ours)
# Non-conflicting changes always merge normally. A merge git still can't resolve
# falls back to a manual fix (shown in the status bar).
merge_conflicts: incoming

# Edits commit immediately but pushes are batched: at most one push every this
# many seconds, bundling all commits made in between.
push_interval: 5

# How often (seconds) to poll the remote in the background for others' changes.
# Lower = more responsive, more git fetches. Exponential backoff (below) keeps
# idle polling cheap, so a low value here is fine.
poll_interval: 1

# When polls keep finding nothing new AND there are no unpushed local commits,
# the fetch interval backs off exponentially (2 -> 4 -> 8 ...) up to this cap (s),
# then resets to poll_interval as soon as there is activity. Only the cap is
# configurable; the backoff itself is always on. Set equal to poll_interval to
# effectively disable backoff.
poll_backoff_max: 300

# Item card layout: which fields appear on cards, arranged in an ASCII grid.
# Two modes: collapsed (unselected cards) and expanded (selected / search-highlighted).
# Available fields: title, description, blame, due, relationships
# Digits in fence segments set column width ratios (+---1---+---2---+ = 1:2 split).
# Unannotated closing fences inherit column positions from the annotated reference fence.
item_layout:
  collapsed: |
    +---1---+
    | title |
    +-------+
  expanded: |
    +-------2-------+
    | title         |
    +---------------+
    | description   |
    +---1---+---1---+
    | blame | due   |
    +---------------+
    | relationships |
    +---------------+
