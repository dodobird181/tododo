- id: 0b2868b1c26041f28b42992604188884
  title: '[CLAUDE] make deadline picking smoother UI experience'
  points: 0
  description: 'this involves autofilling the duedate in as the current date (written
    in the specified strftime format inside settings.yaml) and allowing the RIGHT
    and LEFT arrows to increment / deincrement the due date (cannot go before the
    current date...)


    Holding SHIFT while using RIGHT and LEFT will increment by a week instead of a
    single day.


    the UI should display a two lines of text on top of each other indicating what
    is happning, 1. the relative time e.g., "3 days from now," "6 weeks from now,"
    "3 months from now," etc.


    the default settings should transorm days into weeks at more than 30 days and
    weeks into months at more than 8 weeks, if that makes sense heh...'
  column: Trash
  author: dodobird181@gmail.com
