  title: '[CLAUDE] Add an MCP Server'
  points: 0
  description: 'Available endpoints should be:


    - search for an item by a keyword


    - list boards


    - list columns


    - list items in board


    - list items in column


    - show item details (YAML)


    - create new item (must provide LLM name, e.g., Claude)


