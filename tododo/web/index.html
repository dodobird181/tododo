/* ---------------- Selection ---------------- */
function cursorItem() { return itemsCache.find(i => i.id === cursorId) || null; }
function selectedItems() {
  const chosen = itemsCache.filter(i => selection.has(i.id));
  return chosen.length ? chosen : (cursorItem() ? [cursorItem()] : []);
}
function setCursor(id, mode = "replace") {
  cursorId = id;
  const item = itemsCache.find(i => i.id === id);
  if (item) cursorCol = item.column.value;
  if (mode === "toggle") { selection.has(id) ? selection.delete(id) : selection.add(id); }
  else if (mode === "add") { selection.add(id); }
  else { selection = new Set([id]); }
  refocus(`[data-item="${CSS.escape(id)}"]`);
}
// Focus a column with no card (so it can still receive new items).
function setCursorCol(col) {
  cursorCol = col; cursorId = null; selection = new Set();
  refocus(`[data-col="${CSS.escape(col)}"]`);
}
// Repaint from cache (so a minimized column with the cursor expands immediately),
// then scroll the focused element into view — no network, so it's instant.
function refocus(selector) {
  paint();
  const c = document.querySelector(selector);
  if (c) c.scrollIntoView({ block: "nearest", inline: "nearest" });
}
function focusedColumn() { return cursorItem()?.column.value || cursorCol || null; }

/* ---------------- Board helpers ---------------- */
function currentBoard() { return boards.find(b => b.id === currentBoardId) || null; }
function columnItems(col) {
  return itemsCache.filter(i => i.column.value === col).sort((a, b) => effOrder(a) - effOrder(b) || (a.id < b.id ? -1 : 1));
}
const effOrder = (item) => { const v = parseFloat(item.order.value); return Number.isFinite(v) ? v : 0; };

async function moveHorizontal(dir) {
  const board = currentBoard(); if (!board) return;
  const items = selectedItems(); if (!items.length) return;
  status("moving…");
  for (const item of items) {
    const idx = board.columns.indexOf(item.column.value);
    const target = board.columns[idx + dir];
    if (target) await submit("/item/edit", { target: item.id, field: "column", value: target });
  }
  status("ok"); await render();
}
// Reorder a column by dropping its header onto another: bubble `from` to the
// target's slot one adjacent SwapColumn at a time (the backend only swaps
// pairs, and a run of adjacent swaps is exactly an insertion move).
async function reorderColumn(from, to) {
  const board = currentBoard(); if (!board) return;
  const cols = [...board.columns];
  let index = cols.indexOf(from);
  const target = cols.indexOf(to);
  if (index < 0 || target < 0 || index === target) return;
  const dir = target > index ? 1 : -1;
  status("reordering columns…");
  while (index !== target) {
    const neighbor = cols[index + dir];
    await submit("/column/swap", { board: board.id, col: from, with: neighbor });
    cols[index] = neighbor; cols[index + dir] = from; index += dir;
  }
  status("ok"); await render();
}
// Move every selected item up/down one slot within its column (a run of
// selected items travels together, past one unselected neighbour). Only the
// columns holding a selection are touched, and only items whose position
// actually changed are re-written (as sequential integer orders).
async function moveVertical(dir) {
  const selected = selectedItems(); if (!selected.length) return;
  const selectedIds = new Set(selected.map(i => i.id));
  const columns = [...new Set(selected.map(i => i.column.value))];
  let touched = false;
  status("moving…");
  for (const col of columns) {
    const list = columnItems(col);
    const arranged = shiftSelectedWithin(list, selectedIds, dir);
    if (arranged.every((item, k) => item.id === list[k].id)) continue;
    for (let k = 0; k < arranged.length; k++) {
      if (effOrder(arranged[k]) !== k) {
        await submit("/item/edit", { target: arranged[k].id, field: "order", value: String(k) });
        touched = true;
      }
    }
  }
  if (touched) { status("ok"); await render(); } else status("");
}
function shiftSelectedWithin(list, selectedIds, dir) {
  const arranged = [...list];
  if (dir < 0) {
    for (let i = 1; i < arranged.length; i++)
      if (selectedIds.has(arranged[i].id) && !selectedIds.has(arranged[i - 1].id))
        [arranged[i - 1], arranged[i]] = [arranged[i], arranged[i - 1]];
  } else {
    for (let i = arranged.length - 2; i >= 0; i--)
      if (selectedIds.has(arranged[i].id) && !selectedIds.has(arranged[i + 1].id))
        [arranged[i + 1], arranged[i]] = [arranged[i], arranged[i + 1]];
  }
  return arranged;
}

/* ---------------- Cursor / drag from keyboard ---------------- */
function moveCursor(key, shift) {
  const board = currentBoard(); if (!board || !board.columns.length) return;
  // Navigate every column, including empty ones (which become the focused column
  // so a new item can be created there). Minimized columns expand on arrival.
  const cols = board.columns;
  const items = (c) => columnItems(c);
  let ci = cursorCol ? cols.indexOf(cursorCol) : -1;
  if (ci < 0) ci = 0;
  const cur = cursorItem();
  const pi = cur ? items(cols[ci]).findIndex(i => i.id === cur.id) : -1;
  const go = (id) => setCursor(id, shift ? "add" : "replace");
  if (key === "ArrowUp") { const t = items(cols[ci])[pi - 1]; if (t) go(t.id); }
  else if (key === "ArrowDown") {
    const list = items(cols[ci]);
    const t = list[pi < 0 ? 0 : pi + 1]; if (t) go(t.id);
  } else {
    const dir = key === "ArrowLeft" ? -1 : 1;
    const j = ci + dir;
    if (j < 0 || j >= cols.length) return;
    const list = items(cols[j]);
    if (!list.length) setCursorCol(cols[j]);                       // land on empty column
    else go(list[Math.min(Math.max(pi, 0), list.length - 1)].id);
  }
}
function dragSelected(key) {
  if (!selectedItems().length) { status("select an item first"); return; }
  if (key === "ArrowLeft") return moveHorizontal(-1);
  if (key === "ArrowRight") return moveHorizontal(1);
  if (key === "ArrowUp") return moveVertical(-1);
  if (key === "ArrowDown") return moveVertical(1);
}

/* ---------------- Actions ---------------- */
async function runAction(action) {
  const board = currentBoard();
  switch (action) {
    case "open_palette": return modalPalette();
    case "keybindings": return modalKeybindings();
    case "themes": return modalThemes();
    case "column_colors": return modalColumnColors();
    case "settings": return modalSettings();
    case "calendar": return toggleCalendar();
    case "kanban": return toggleCalendar(false);
    case "reset_cal_cursor": return resetCalCursor();
    case "new_board": return modalNewBoard();
    case "delete_board": return deleteBoard();
    case "new_column": return createColumn();
    case "search": return modalSearch();
    case "switch_board": return modalBoards();
    case "create": {
      if (!board) return;
      const col = focusedColumn() || board.columns.find(c => !minimizedCols().includes(c)) || board.columns[0];
      // In calendar mode a new item inherits the time cursor's start/end.
      if (calendarMode && calCursorStart && calCursorEnd) {
        return addItem(col, { start: toLocalInput(calCursorStart), end: toLocalInput(calCursorEnd) });
      }
      return addItem(col);
    }
    case "minimize": {
      const col = focusedColumn() || board?.columns[0];
      if (col) await toggleMinimize(col);
      return;
    }
  }
  const item = cursorItem();
  if (!item) { status("select an item first"); return; }
  switch (action) {
    case "edit": return openEdit(item);
    case "due_date": return modalDueDate(item);
    case "view_yaml": return modalYaml(item);
    case "delete": {
      const items = selectedItems();
      const msg = items.length > 1 ? `Delete ${items.length} items?` : `Delete “${item.title.value || "(untitled)"}”?`;
      if (await modalConfirm({ title: "Delete", message: msg })) {
        status("deleting…");
        for (const it of items) await submit("/item/delete", { target: it.id });
        selection.clear(); status("ok"); await render();
      }
      return;
    }
  }
}

/* ---------------- Rendering ---------------- */
async function loadBoards() {
  boards = (await api.get("/boards")).boards;
  if (!currentBoardId || !boards.find(b => b.id === currentBoardId)) currentBoardId = boards[0]?.id || null;
  updateTitle();
}
function updateTitle() {
  const name = currentBoard()?.name.value || "Tododo";
  document.title = name;
  document.getElementById("boardTitle").textContent = name;
}

// Full reload: hit the network, refresh the caches, then paint. Called after
// writes and on the periodic tick.
async function render() {
  await loadBoards();
  if (!currentBoardId) { paint(); return; }
  const [items, conflicts] = await Promise.all([
    api.get("/items"),
    api.get(`/conflicts?board=${currentBoardId}`),
  ]);
  itemsCache = items.items.filter(i => i.board.value === currentBoardId);
  conflictsCache = conflicts.conflicts;
  paint();
}

// Pure repaint from the in-memory caches — no network. Cursor moves and
// minimize toggles call this so expand/collapse is instant.
function paint() {
  const boardEl = document.getElementById("board");
  const conflictsEl = document.getElementById("conflicts");
  boardEl.innerHTML = ""; conflictsEl.innerHTML = "";
  if (!currentBoardId) { boardEl.innerHTML = '<div class="empty">No boards yet — tap <kbd>space</kbd> then <kbd>m</kbd>.</div>'; return; }

  const board = currentBoard();
  selection = new Set([...selection].filter(id => itemsCache.find(i => i.id === id)));
  if (cursorId && !itemsCache.find(i => i.id === cursorId)) cursorId = null;
  if (cursorCol && !board.columns.includes(cursorCol)) cursorCol = null;

  if (calendarMode) { paintCalendar(boardEl); return; }

  for (const col of board.columns) {
    const items = columnItems(col);
    const collapsed = isCollapsed(col);
    const pinnedMin = minimizedCols().includes(col);
    const colEl = el("div", { className: "col" + (collapsed ? " min" : "") });
    colEl.setAttribute("data-col", col);
    colEl.style.setProperty("--col-color", columnColor(col, board));
    const badge = collapsed ? `${items.length} ▸` : (pinnedMin ? `${items.length} ▾` : `${items.length}`);
    const head = el("h2", { draggable: true }, el("span", {}, col), el("span", { className: "count" }, badge));
    head.title = "click to minimize/expand · drag to reorder";
    head.onclick = () => toggleMinimize(col);
    head.ondragstart = (e) => { dragCol = col; e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", col); e.stopPropagation(); };
    head.ondragend = () => { dragCol = null; document.querySelectorAll(".col").forEach(c => c.classList.remove("coldrop")); };
    colEl.append(head);
    // Column reorder (drag the header) works on any column, collapsed or not;
    // card drops only land in expanded columns.
    colEl.ondragover = (e) => {
      if (dragCol && dragCol !== col) { e.preventDefault(); colEl.classList.add("coldrop"); }
      else if (dragIds.length && !collapsed) { e.preventDefault(); }
    };
    colEl.ondragleave = () => colEl.classList.remove("coldrop");
    colEl.ondrop = (e) => {
      colEl.classList.remove("coldrop");
      if (dragCol && dragCol !== col) { e.preventDefault(); reorderColumn(dragCol, col); }
      else if (dragIds.length && !collapsed) { e.preventDefault(); dropItems(col, columnItems(col).filter(i => !dragIds.includes(i.id)).length); }
    };
    if (!collapsed) {
      for (const item of items) colEl.append(cardEl(item, board));
      colEl.append(el("button", { className: "add", textContent: "+ item", onclick: () => addItem(col) }));
    }
    boardEl.append(colEl);
  }
  renderSelection();
  renderConflicts(conflictsEl);
}

async function addItem(col, opts = {}) {
  const title = await modalText({ title: "New item", label: `Column: ${col}`, placeholder: "Title", view: "create_item" });
  if (title) await write("/item", { board: currentBoardId, column: col, title, ...opts }, "creating item");
}

function cardEl(item, board) {
  const node = el("div", { className: "card", draggable: true });
  node.setAttribute("data-item", item.id);
  node.onclick = (e) => setCursor(item.id, e.shiftKey ? "toggle" : "replace");
  node.ondblclick = () => { setCursor(item.id); openEdit(item); };
  node.append(el("div", { className: "title", textContent: item.title.value || "(untitled)" }));
  if (item.end.value) node.append(el("div", { className: "meta", textContent: "due " + item.end.value.slice(0, 16).replace("T", " ") }));
  if (item.assigned_to.value) node.append(el("div", { className: "meta", textContent: "@" + item.assigned_to.value }));
  node.append(el("div", { className: "meta", textContent: "by " + (item.title.last_edited_by || "?") }));
  const actions = el("div", { className: "actions" });
  actions.append(btn("edit", () => { setCursor(item.id); openEdit(item); }));
  actions.append(btn("del", () => { setCursor(item.id); runAction("delete"); }));
  node.append(actions);

  // Drag & drop: reorder within a column and move between columns.
  node.ondragstart = (e) => {
    dragIds = (selection.has(item.id) && selection.size > 1) ? [...selection] : [item.id];
    if (!selection.has(item.id)) setCursor(item.id);
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", item.id);
    node.classList.add("dragging");
  };
  node.ondragend = () => { dragIds = []; document.querySelectorAll(".card").forEach(c => c.classList.remove("dragging", "dropbefore", "dropafter")); };
  node.ondragover = (e) => {
    if (!dragIds.length || dragIds.includes(item.id)) return;
    e.preventDefault();
    const below = (e.clientY - node.getBoundingClientRect().top) > node.offsetHeight / 2;
    node.classList.toggle("dropafter", below);
    node.classList.toggle("dropbefore", !below);
  };
  node.ondragleave = () => node.classList.remove("dropbefore", "dropafter");
  node.ondrop = (e) => {
    if (!dragIds.length) return;
    e.preventDefault(); e.stopPropagation();
    const below = (e.clientY - node.getBoundingClientRect().top) > node.offsetHeight / 2;
    const rest = columnItems(item.column.value).filter(i => !dragIds.includes(i.id));
    const xi = rest.findIndex(i => i.id === item.id);
    dropItems(item.column.value, (xi < 0 ? rest.length : xi) + (below ? 1 : 0));
  };
  return node;
}

// Move the dragged item(s) into `col` at position `index` (among the column's
// non-dragged items), assigning fractional order values between neighbours.
async function dropItems(col, index) {
  const targets = itemsCache.filter(i => dragIds.includes(i.id)).sort((a, b) => effOrder(a) - effOrder(b));
  if (!targets.length) return;
  const rest = columnItems(col).filter(i => !dragIds.includes(i.id));
  const before = rest[index - 1], after = rest[index];
  const b = before ? effOrder(before) : null, a = after ? effOrder(after) : null;
  let start, step;
  if (b == null && a == null) { start = 0; step = 1; }
  else if (b == null) { start = a - targets.length; step = 1; }
  else if (a == null) { start = b + 1; step = 1; }
  else { const gap = (a - b) / (targets.length + 1); start = b + gap; step = gap; }
  status("moving…");
  for (let k = 0; k < targets.length; k++) {
    const it = targets[k];
    if (it.column.value !== col) await submit("/item/edit", { target: it.id, field: "column", value: col });
    await submit("/item/edit", { target: it.id, field: "order", value: String(start + step * k) });
  }
  dragIds = []; status("ok"); await render();
}
function renderSelection() {
  document.querySelectorAll(".card").forEach(c => {
    const id = c.getAttribute("data-item");
    c.classList.toggle("sel", selection.has(id));
    c.classList.toggle("cursor", id === cursorId);
  });
  const focusCol = focusedColumn();
  document.querySelectorAll(".col").forEach(c => c.classList.toggle("colfocus", !cursorId && c.getAttribute("data-col") === focusCol));
}
function btn(label, onclick) {
  return el("button", { className: "link", textContent: label, onclick: (e) => { e.stopPropagation(); onclick(); } });
}

function renderConflicts(host) {
  const conflicts = conflictsCache;
  if (!conflicts.length) return;
  host.className = "conflicts";
  host.innerHTML = `<h2>⚠ ${conflicts.length} conflict(s)</h2>`;
  for (const c of conflicts) {
    const div = el("div", { className: "conflict" });
    div.innerHTML = `<div><b>${c.field}</b> on <code>${c.target.slice(0,8)}</code> — pick one:</div>`;
    const cands = el("div", { className: "cands" });
    for (const ev of c.events) {
      const value = ev.payload.value ?? "";
      cands.append(btn(`"${value}" (${ev.by || "?"})`, () => write("/resolve", { target: c.target, field: c.field, parents: c.events.map(e => e.id), value }, "resolving")));
    }
    div.append(cands); host.append(div);
  }
}

/* ---------------- Calendar mode (week grid) ---------------- */
const HOUR_PX = 48;                  // pixels per hour row in the time grid
let calWeekStart = null;             // Date at 00:00 on the Sunday of the shown week
let calScrollTop = null;            // preserved vertical scroll across repaints

// Every item on the board that carries both a start and an end, as {item,s,e}.
function calendarEvents() {
  return itemsCache
    .filter(i => i.start.value && i.end.value)
    .map(i => ({ item: i, s: new Date(i.start.value), e: new Date(i.end.value) }))
    .filter(ev => !isNaN(ev.s) && !isNaN(ev.e));
}
const fmtCalTime = (iso) => { const d = new Date(iso); return isNaN(d) ? iso : d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" }); };
function fmtCalRange(startIso, endIso) {
  const same = startIso.slice(0, 10) === endIso.slice(0, 10);
  return same ? `${fmtCalTime(startIso)} – ${fmtCalTime(endIso)}`
    : `${fmtCalTime(startIso)} – ${endIso.slice(0, 10)} ${fmtCalTime(endIso)}`;
}
function startOfWeek(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - x.getDay()); return x; }
function sameDay(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); }
function dayIndex(weekStart, d) { return Math.floor((new Date(d.getFullYear(), d.getMonth(), d.getDate()) - weekStart) / 86400000); }
function hourLabel(h) { if (h <= 0 || h >= 24) return ""; const ap = h < 12 ? "AM" : "PM"; return `${(h % 12) || 12} ${ap}`; }
function shiftWeek(delta) {
  if (!calWeekStart) calWeekStart = startOfWeek(new Date());
  const d = new Date(calWeekStart); d.setDate(d.getDate() + delta * 7); calWeekStart = d; paint();
}
// Greedy side-by-side packing: each event takes the first lane free at its start.
function packLanes(events) {
  const laneEnds = [], placed = [];
  for (const ev of events) {
    let lane = 0;
    while (lane < laneEnds.length && laneEnds[lane] > ev.s) lane++;
    laneEnds[lane] = ev.e; placed.push({ ev, lane });
  }
  return { placed, laneCount: Math.max(1, laneEnds.length) };
}

function paintCalendar(host) {
  if (!calWeekStart) calWeekStart = startOfWeek(new Date());
  const weekStart = calWeekStart;
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 7);
  const today = zonedNow(nowTimezone());
  const events = calendarEvents().filter(ev => ev.e > weekStart && ev.s < weekEnd);
  const allDay = events.filter(ev => !sameDay(ev.s, ev.e)).sort((a, b) => a.s - b.s);
  const timed = events.filter(ev => sameDay(ev.s, ev.e));

  // Nav bar.
  const nav = el("div", { className: "calnav" },
    el("button", { className: "link arrow", title: "Previous week", onclick: () => shiftWeek(-1) }, "‹"),
    el("button", { className: "link", onclick: () => { calWeekStart = startOfWeek(new Date()); paint(); } }, "Today"),
    el("button", { className: "link arrow", title: "Next week", onclick: () => shiftWeek(1) }, "›"),
    el("span", { className: "range" }, weekRangeLabel(weekStart)));

  // Day-of-week header.
  const head = el("div", { className: "calhead" }, el("div", { className: "gutter" }));
  for (let c = 0; c < 7; c++) {
    const d = new Date(weekStart); d.setDate(d.getDate() + c);
    head.append(el("div", { className: "day" + (sameDay(d, today) ? " today" : "") },
      el("div", { className: "dow" }, d.toLocaleDateString(undefined, { weekday: "short" })),
      el("div", { className: "dom" }, String(d.getDate()))));
  }

  // All-day / multi-day band.
  const lanes = el("div", { className: "lanes" });
  const rows = [];
  for (const ev of allDay) {
    const startCol = Math.max(0, dayIndex(weekStart, ev.s));
    const endCol = Math.min(6, dayIndex(weekStart, new Date(ev.e.getTime() - 1)));
    let r = 0;
    while (rows[r] && rows[r].some(x => !(endCol < x.a || startCol > x.b))) r++;
    (rows[r] = rows[r] || []).push({ a: startCol, b: endCol });
    const bar = el("div", { className: "calspan", textContent: ev.item.title.value || "(untitled)" });
    bar.style.setProperty("--col-color", columnColor(ev.item.column.value));
    if (minimizedCols().includes(ev.item.column.value)) bar.classList.add("hiddencol");
    if (selection.has(ev.item.id)) bar.classList.add("sel", "touch");
    if (ev.item.id === cursorId) bar.classList.add("cursor");
    bar.style.gridColumn = `${startCol + 1} / ${endCol + 2}`;
    bar.style.gridRow = String(r + 1);
    bar.onclick = () => { setCursor(ev.item.id); openEdit(ev.item); };
    lanes.append(bar);
  }
  const allDayEl = el("div", { className: "callday" }, el("div", { className: "gutter" }, "all-day"), lanes);

  // Scrolling time grid.
  const gutter = el("div", { className: "gutter" });
  for (let h = 0; h <= 24; h++) {
    const label = el("div", { className: "hourlabel", textContent: hourLabel(h) });
    label.style.top = (h * HOUR_PX) + "px"; gutter.append(label);
  }
  const days = el("div", { className: "caldays" });
  days.style.height = (24 * HOUR_PX) + "px";
  for (let c = 0; c < 7; c++) {
    const col = el("div", { className: "caldaycol" });
    for (let h = 1; h < 24; h++) { const line = el("div", { className: "calhour" }); line.style.top = (h * HOUR_PX) + "px"; col.append(line); }
    const dayEvents = timed.filter(ev => dayIndex(weekStart, ev.s) === c).sort((a, b) => a.s - b.s || b.e - a.e);
    const { placed, laneCount } = packLanes(dayEvents);
    for (const { ev, lane } of placed) {
      const startMin = ev.s.getHours() * 60 + ev.s.getMinutes();
      const endMin = Math.max(startMin + 15, ev.e.getHours() * 60 + ev.e.getMinutes());
      const box = el("div", { className: "calevent" });
      box.style.setProperty("--col-color", columnColor(ev.item.column.value));
      if (minimizedCols().includes(ev.item.column.value)) box.classList.add("hiddencol");
      box.style.top = (startMin / 60 * HOUR_PX) + "px";
      box.style.height = ((endMin - startMin) / 60 * HOUR_PX - 2) + "px";
      box.style.left = (lane / laneCount * 100) + "%";
      box.style.width = (1 / laneCount * 100) + "%";
      if (selection.has(ev.item.id)) box.classList.add("sel", "touch");
      if (ev.item.id === cursorId) box.classList.add("cursor");
      box.append(
        el("div", { className: "cn", textContent: ev.item.title.value || "(untitled)" }),
        el("div", { className: "ct", textContent: fmtCalRange(ev.item.start.value, ev.item.end.value) }));
      box.onclick = () => { setCursor(ev.item.id); openEdit(ev.item); };
      col.append(box);
    }
    const colDate = new Date(weekStart); colDate.setDate(colDate.getDate() + c);
    if (sameDay(colDate, today)) {
      const nowMin = today.getHours() * 60 + today.getMinutes();
      const now = el("div", { className: "calnow" }, el("div", { className: "dot" }));
      now.style.top = (nowMin / 60 * HOUR_PX) + "px"; col.append(now);
    }
    // The swept selection region (drawn first, underneath) and the movable
    // cursor on top, each sliced to this day column (a range may span days).
    const dayStart = new Date(colDate); dayStart.setHours(0, 0, 0, 0);
    const dayEnd = new Date(dayStart); dayEnd.setDate(dayEnd.getDate() + 1);
    const sliceBox = (rangeStart, rangeEnd, className) => {
      if (!rangeStart || !rangeEnd || !(rangeEnd > dayStart && rangeStart < dayEnd)) return;
      const segStart = rangeStart > dayStart ? rangeStart : dayStart;
      const segEnd = rangeEnd < dayEnd ? rangeEnd : dayEnd;
      const startMin = segStart.getHours() * 60 + segStart.getMinutes();
      const endMin = segEnd.getTime() === dayEnd.getTime() ? 1440 : segEnd.getHours() * 60 + segEnd.getMinutes();
      const box = el("div", { className });
      box.style.top = (startMin / 60 * HOUR_PX) + "px";
      box.style.height = Math.max(2, (endMin - startMin) / 60 * HOUR_PX) + "px";
      col.append(box);
    };
    const swept = calSelStart && calSelEnd && (+calSelStart !== +calCursorStart || +calSelEnd !== +calCursorEnd);
    if (swept) sliceBox(calSelStart, calSelEnd, "calselection");
    sliceBox(calCursorStart, calCursorEnd, "calcursor");
    days.append(col);
  }
  const body = el("div", { className: "calbody" }, gutter, days);
  body.addEventListener("scroll", () => { calScrollTop = body.scrollTop; });

  host.append(el("div", { className: "calweek" }, nav, head, allDayEl, body));
  // Preserve the user's scroll across the periodic repaints; default to ~7 AM.
  body.scrollTop = calScrollTop == null ? 7 * HOUR_PX : calScrollTop;
}
function weekRangeLabel(weekStart) {
  const end = new Date(weekStart); end.setDate(end.getDate() + 6);
  const month = (d) => d.toLocaleDateString(undefined, { month: "short" });
  const sameMonth = weekStart.getMonth() === end.getMonth();
  return sameMonth
    ? `${month(weekStart)} ${weekStart.getDate()} – ${end.getDate()}, ${end.getFullYear()}`
    : `${month(weekStart)} ${weekStart.getDate()} – ${month(end)} ${end.getDate()}, ${end.getFullYear()}`;
}
function updateCalendarBtn() {
  const btn = document.getElementById("calendarBtn");
  if (btn) btn.classList.toggle("btnfocus", calendarMode);
}
function toggleCalendar(on) {
  calendarMode = on === undefined ? !calendarMode : on;
  document.body.classList.toggle("calmode", calendarMode);
  if (calendarMode) initCalCursor();
  updateCalendarBtn();
  paint();
  if (workspace.calendar_mode !== calendarMode) { workspace.calendar_mode = calendarMode; saveWorkspace(); }
}
// Seed the time cursor on first entry: reuse the selected item's range if it has
// one, else "now" (floored to the increment grid) for one increment.
function initCalCursor() {
  if (!calCursorStart || !calCursorEnd) {
    const cur = cursorItem();
    if (cur && cur.start.value && cur.end.value) {
      calCursorStart = new Date(cur.start.value);
      calCursorEnd = new Date(cur.end.value);
    } else {
      const inc = calIncrementMinutes();
      const s = new Date(); s.setSeconds(0, 0);
      s.setMinutes(Math.floor(s.getMinutes() / inc) * inc);
      calCursorStart = s;
      calCursorEnd = new Date(+s + inc * 60000);
    }
  }
  if (!calWeekStart) calWeekStart = startOfWeek(calCursorStart);
  else ensureCursorVisible();
  collapseCalSelection();
}
// Scroll the shown week to the one holding the cursor's start.
function ensureCursorVisible() {
  if (!calWeekStart || !calCursorStart) return;
  const weekEnd = new Date(calWeekStart); weekEnd.setDate(weekEnd.getDate() + 7);
  if (calCursorStart < calWeekStart || calCursorStart >= weekEnd) calWeekStart = startOfWeek(calCursorStart);
}
// Arrows move the fixed-size cursor: up/down by the increment, left/right by
// whole days. Like the kanban board, plain moves collapse the selection back to
// the cursor; holding Shift extends it — the selection range only ever grows to
// cover wherever the cursor has swept, so a Shift move can never deselect.
function moveCalCursor(key, shift) {
  const duration = calCursorEnd - calCursorStart;
  const inc = calIncrementMinutes() * 60000;
  const delta = (key === "ArrowUp") ? -inc
    : (key === "ArrowDown") ? inc
    : (key === "ArrowLeft") ? -86400000 : 86400000;
  calCursorStart = new Date(+calCursorStart + delta);
  calCursorEnd = new Date(+calCursorStart + duration);
  if (shift) {
    calSelStart = new Date(Math.min(+calSelStart, +calCursorStart));
    calSelEnd = new Date(Math.max(+calSelEnd, +calCursorEnd));
    syncCalendarSelection();
  } else {
    collapseCalSelection();
  }
  ensureCursorVisible();
  paint();
}
// Escape (and every plain move) collapses the swept selection back down to the
// cursor's own footprint.
function resetCalCursor() {
  if (!calCursorStart) return;
  collapseCalSelection();
  ensureCursorVisible();
  paint();
}
function collapseCalSelection() {
  calSelStart = calCursorStart;
  calSelEnd = calCursorEnd;
  syncCalendarSelection();
}
// Select every item whose range overlaps the swept selection range (the same
// `selection` set the rest of the app and backend edits act on); the cursor id
// points at one of them so single-item shortcuts (Enter to edit) work.
function syncCalendarSelection() {
  if (!calSelStart || !calSelEnd) return;
  const touching = calendarEvents().filter(ev => ev.s < calSelEnd && ev.e > calSelStart);
  selection = new Set(touching.map(ev => ev.item.id));
  cursorId = touching.length ? touching[0].item.id : null;
  // The cursor moved, so any in-progress lowercase-c cycle is stale.
  calCycleGroup = []; calCycleIndex = -1;
}
// Lowercase c narrows a multi-item selection down to one item at a time, cycling
// through the swept group on each press. The `selection` set really shrinks to
// the single item, so Enter/move/resize then act on just that one. Cursor
// movement re-syncs the selection and resets the cycle.
function cycleCalendarSelection() {
  if (calCycleGroup.length < 2) {
    const ids = [...selection];
    if (ids.length < 2) { status("select multiple items first"); return; }
    calCycleGroup = ids;
    calCycleIndex = -1;
  }
  calCycleIndex = (calCycleIndex + 1) % calCycleGroup.length;
  const id = calCycleGroup[calCycleIndex];
  selection = new Set([id]);
  cursorId = id;
  status(`item ${calCycleIndex + 1} / ${calCycleGroup.length}`);
  paint();
}
const arrowDeltaMs = (key) => (key === "ArrowUp") ? -calIncrementMinutes() * 60000
  : (key === "ArrowDown") ? calIncrementMinutes() * 60000
  : (key === "ArrowLeft") ? -86400000 : 86400000;

// While Ctrl (move) or Shift+R (resize) is held, item edits are applied
// optimistically to itemsCache and their dirty fields accumulated here; a
// single batched POST per item is flushed only once every drag modifier is
// released (flushCalPending). This keeps a burst of key-repeats from spamming
// the backend with racing per-key edits (which could otherwise interleave a
// stale start with a fresh end and silently resize the item).
let calPending = null;   // Map<item id, {start:bool, end:bool}> of un-flushed fields
function markCalPending(id, field) {
  if (!calPending) calPending = new Map();
  const dirty = calPending.get(id) || { start: false, end: false };
  dirty[field] = true;
  calPending.set(id, dirty);
}
// Ctrl+arrows move the selected item(s) in time (keeping each duration) and the
// cursor along with them; up/down by the increment, left/right by whole days.
function moveItemsInCalendar(key) {
  const items = selectedItems();
  if (!items.length) { status("select an item first"); return; }
  const delta = arrowDeltaMs(key);
  for (const item of items) {
    if (!item.start.value || !item.end.value) continue;
    item.start.value = toLocalInput(new Date(+new Date(item.start.value) + delta));
    item.end.value = toLocalInput(new Date(+new Date(item.end.value) + delta));
    markCalPending(item.id, "start");
    markCalPending(item.id, "end");
  }
  shiftCalCursor(delta);
  status("moving…");
  paint();
}
// Shift+R + up/down resize the selected item(s): Down grows each by one
// increment, Up shrinks (never below a single increment). Only the end moves.
function resizeItemsInCalendar(key) {
  if (key !== "ArrowUp" && key !== "ArrowDown") return;
  const items = selectedItems();
  if (!items.length) { status("select an item first"); return; }
  const inc = calIncrementMinutes() * 60000;
  const grow = key === "ArrowDown";
  for (const item of items) {
    if (!item.start.value || !item.end.value) continue;
    const start = new Date(item.start.value);
    let end = new Date(+new Date(item.end.value) + (grow ? inc : -inc));
    if (+end - +start < inc) end = new Date(+start + inc);
    item.end.value = toLocalInput(end);
    markCalPending(item.id, "end");
  }
  status("resizing…");
  paint();
}
// Slide the cursor and its selection region by a delta (used when dragging items
// so the cursor tracks them) without disturbing the selected set.
function shiftCalCursor(delta) {
  if (!calCursorStart) return;
  calCursorStart = new Date(+calCursorStart + delta);
  calCursorEnd = new Date(+calCursorEnd + delta);
  if (calSelStart) { calSelStart = new Date(+calSelStart + delta); calSelEnd = new Date(+calSelEnd + delta); }
  ensureCursorVisible();
}
async function flushCalPending() {
  if (!calPending || !calPending.size) { calPending = null; return; }
  const dirtyById = [...calPending];
  calPending = null;
  status("saving…");
  for (const [id, dirty] of dirtyById) {
    const item = itemsCache.find(i => i.id === id);
    if (!item) continue;
    if (dirty.start) await submit("/item/edit", { target: id, field: "start", value: item.start.value });
    if (dirty.end) await submit("/item/edit", { target: id, field: "end", value: item.end.value });
  }
  status("ok");
  await render();
}

/* ---------------- Global keys (Space leader; Ctrl only for drag) ---------------- */
let leaderArmed = false, leaderTimer = null;
function armLeader() { leaderArmed = true; status("… command"); clearTimeout(leaderTimer); leaderTimer = setTimeout(cancelLeader, 2000); }
function cancelLeader() { clearTimeout(leaderTimer); if (leaderArmed) { leaderArmed = false; status(""); } }
const leaderAction = (key) => LEADER.find(a => KEYS[a] === key);
const inField = () => ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement?.tagName);

// Keys currently held down, so chords (Shift+R + arrows) and the batched-edit
// flush can tell when every drag modifier has been released.
const heldKeys = new Set();
const calResizeChord = () => heldKeys.has("r") || heldKeys.has("R");
const calDragModifierHeld = () => heldKeys.has("Control") || heldKeys.has("Meta") || heldKeys.has("Shift") || calResizeChord();
document.addEventListener("keyup", (e) => {
  heldKeys.delete(e.key);
  if (calPending && !calDragModifierHeld()) flushCalPending();
});
window.addEventListener("blur", () => { heldKeys.clear(); if (calPending) flushCalPending(); });

document.addEventListener("keydown", (e) => {
  heldKeys.add(e.key);
  if (modalOpen()) { if (modalKeyHandler) modalKeyHandler(e); return; }
  if (e.ctrlKey || e.metaKey) {
    if (!inField() && e.key.startsWith("Arrow")) {
      e.preventDefault();
      if (calendarMode) moveItemsInCalendar(e.key); else dragSelected(e.key);
    }
    return;  // every other Ctrl chord (Ctrl+N …) stays with the browser
  }
  if (e.altKey || inField()) return;
  // Shift+R + arrows resizes the selected calendar items (before the plain
  // Shift+arrow, which extends the selection instead).
  if (calendarMode && e.shiftKey && calResizeChord() && e.key.startsWith("Arrow")) {
    e.preventDefault(); resizeItemsInCalendar(e.key); return;
  }

  if (leaderArmed) { e.preventDefault(); const a = leaderAction(e.key); cancelLeader(); if (a && actionActive(a)) runAction(a); return; }
  if (e.key === KEYS.leader) { e.preventDefault(); armLeader(); return; }
  if (calendarMode && e.key === KEYS.reset_cal_cursor && actionActive("reset_cal_cursor")) { e.preventDefault(); resetCalCursor(); return; }
  if (calendarMode && e.key === KEYS.confirm) {
    e.preventDefault();
    const chosen = selectedItems();
    if (chosen.length === 1) openEdit(chosen[0]);
    else if (chosen.length === 0) runAction("create");
    else status("select one item to edit — press c to cycle");
    return;
  }
  // Lowercase c (no leader) cycles a multi-selection down to one item at a time.
  if (calendarMode && e.key === "c") { e.preventDefault(); cycleCalendarSelection(); return; }
  if (calendarMode && e.key.startsWith("Arrow")) {
    e.preventDefault();
    moveCalCursor(e.key, e.shiftKey);
    return;
  }
  if (e.key.startsWith("Arrow")) { e.preventDefault(); moveCursor(e.key, e.shiftKey); return; }
  if (e.key === KEYS.edit && cursorItem()) { e.preventDefault(); openEdit(cursorItem()); }
});

/* ---------------- Wiring ---------------- */
document.getElementById("refresh").onclick = render;
document.querySelectorAll("[data-action]").forEach(b => b.onclick = () => runAction(b.dataset.action));
function updateEditModeBtn() { document.getElementById("editModeBtn").textContent = "edit: " + (workspace.edit_pane ? "pane" : "modal"); }
document.getElementById("editModeBtn").onclick = async () => {
  workspace.edit_pane = !workspace.edit_pane;
  if (!workspace.edit_pane) closePane();
  updateEditModeBtn();
  await saveWorkspace();
};

(async () => {
  KEYS = await loadKeys();
  await loadKeyContexts();
  workspace = await loadWorkspace();
  appSettings = await api.get("/settings");
  themeList = (await api.get("/themes")).themes;
  await applyTheme(workspace.theme);
  applyColumnColors();
  updateEditModeBtn();
  if (workspace.current) currentBoardId = workspace.current;
  await render();
  if (workspace.calendar_mode) toggleCalendar(true);
})();
setInterval(() => { if (!modalOpen() && !calPending) render(); }, 4000);
</script>
</body>
