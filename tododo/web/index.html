<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tododo</title>
<style id="theme-base">
  :root {
    color-scheme: dark;
    --bg:#14161a; --panel:#1e2127; --line:#2c313a; --fg:#e6e8eb; --muted:#8b93a0;
    --accent:#6ea8fe; --warn:#f0a35e; --danger:#f0768e;
    --card:#181b20; --card-sel:#2b3550; --card-drag:#37507a; --sel:#2b3550;
    --shadow:rgba(0,0,0,.5);
    --col1:#7aa2f7; --col2:#9ece6a; --col3:#e0af68; --col4:#f7768e;
    --col5:#bb9af7; --col6:#7dcfff; --col7:#ff9e64; --col8:#2ac3de;
  }
</style>
<style id="theme"></style>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui, sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; gap:.6rem; align-items:center; padding:.7rem 1rem; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  header h1 { font-size:1rem; margin:0 .8rem 0 0; letter-spacing:.06em; }
  select, input, button, textarea { font:inherit; color:var(--fg); background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:.35rem .55rem; }
  button { cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.link { background:none; border:none; color:var(--muted); padding:.1rem .3rem; }
  button.link:hover { color:var(--accent); }
  kbd { font:inherit; font-size:.72rem; background:var(--bg); border:1px solid var(--line); border-bottom-width:2px; border-radius:4px; padding:.02rem .32rem; color:var(--muted); }
  #work { display:flex; align-items:stretch; }
  main { padding:1rem; flex:1; min-width:0; }
  #editpane { flex:0 0 400px; width:400px; border-left:1px solid var(--line); background:var(--panel); padding:1rem; overflow:auto; max-height:calc(100vh - 54px); position:sticky; top:0; }
  #editpane[hidden] { display:none; }
  .pane-resizer { position:absolute; left:0; top:0; width:7px; height:100%; cursor:col-resize; z-index:8; }
  .pane-resizer:hover, .pane-resizer.dragging { background:var(--accent); opacity:.6; }
  body.pane-resizing { cursor:col-resize; user-select:none; }
  .panehead { display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem; }
  .panehead strong { font-size:.95rem; }
  @media (max-width:820px) { #editpane { flex-basis:320px; width:320px; } }
  .board { display:flex; gap:1rem; align-items:flex-start; overflow-x:auto; }
  .col { --col-color:var(--line); background:var(--panel); border:1px solid var(--line); border-radius:10px; min-width:264px; max-width:264px; padding:.6rem; }
  .col h2 { font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:.1rem .2rem .6rem; padding-bottom:.35rem; border-bottom:2px solid var(--col-color); display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .col h2 > span:first-child { color:var(--col-color); }
  .col h2 .count { color:var(--muted); font-weight:400; }
  /* Hidden (minimized) columns: no fill, dotted outline in the column's colour. */
  .col.min { min-width:44px; max-width:44px; padding:.6rem .3rem; background:transparent; border:1px dotted var(--col-color); }
  .col.min h2 { writing-mode:vertical-rl; transform:rotate(180deg); margin:0; height:180px; justify-content:flex-start; gap:.5rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:.5rem .6rem; margin-bottom:.5rem; cursor:pointer; }
  .card.sel { background:var(--card-sel); }
  .card.cursor { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .col.colfocus { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .col.coldrop { outline:2px dashed var(--accent); outline-offset:2px; }
  .col h2 { cursor:grab; }
  .col.colfocus .add { border-color:var(--accent); color:var(--fg); }
  .card.dragging { opacity:.4; }
  .card.dropbefore { box-shadow:0 -2px 0 0 var(--accent); }
  .card.dropafter { box-shadow:0 2px 0 0 var(--accent); }
  .card .title { font-weight:600; }
  .card .meta { color:var(--muted); font-size:.75rem; margin-top:.25rem; }
  .card .actions { display:flex; gap:.15rem; margin-top:.4rem; flex-wrap:wrap; }
  .add { width:100%; margin-top:.3rem; background:none; border:1px dashed var(--line); color:var(--muted); }
  .conflicts { margin-top:1.5rem; border:1px solid var(--warn); border-radius:10px; padding:.75rem 1rem; }
  .conflicts h2 { color:var(--warn); margin:.2rem 0 .6rem; font-size:.9rem; }
  .conflict { border-top:1px solid var(--line); padding:.5rem 0; }
  .conflict .cands { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.3rem; }
  .empty { color:var(--muted); padding:2rem; text-align:center; }
  #status { color:var(--muted); font-size:.8rem; margin-left:auto; }

  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-start; justify-content:center; padding-top:10vh; z-index:50; }
  .overlay[hidden] { display:none; }
  .modal { background:var(--panel); border:1px solid var(--line); border-radius:12px; box-shadow:0 12px 40px var(--shadow); width:min(620px, 94vw); max-height:80vh; overflow:auto; padding:1rem 1.1rem; }
  .modal h3 { margin:0 0 .8rem; font-size:1rem; }
  .modal label { display:block; color:var(--muted); font-size:.78rem; margin:.6rem 0 .2rem; }
  .modal input[type=text], .modal input[type=datetime-local], .modal textarea, .modal select { width:100%; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:0 .8rem; }
  .colorgrid { display:grid; grid-template-columns:1fr 1fr; gap:.45rem .8rem; margin:.6rem 0; }
  .colorrow { display:flex; align-items:center; gap:.5rem; cursor:pointer; }
  .colorrow input[type=color] { width:2.2rem; height:1.7rem; padding:0; border:1px solid var(--line); border-radius:5px; background:none; cursor:pointer; flex:0 0 auto; }
  .colorrow span { font-size:.8rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .modal .row { display:flex; gap:.5rem; justify-content:flex-end; margin-top:1rem; }
  .modal .hint { color:var(--muted); font-size:.75rem; margin-top:.3rem; }
  .kbtable { width:100%; border-collapse:collapse; font-size:.85rem; }
  .kbtable td { padding:.28rem .3rem; border-bottom:1px solid var(--line); }
  .kbtable td.k { text-align:right; width:12rem; }
  .kbtable tr.capturing td.k { color:var(--accent); }
  .plist { list-style:none; margin:0; padding:0; }
  .plist li { display:flex; justify-content:space-between; align-items:center; padding:.4rem .5rem; border-radius:6px; cursor:pointer; }
  .plist li.on, .plist li:hover { background:var(--sel); }
  .plist li.disabled { color:var(--muted); cursor:default; }
  .plist li.disabled:hover, .plist li.disabled.on { background:none; }
  button.btnfocus { outline:2px solid var(--accent); outline-offset:1px; }
  pre.yaml { background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:.7rem; overflow:auto; font-size:.8rem; white-space:pre-wrap; word-break:break-word; }

  .mdtoolbar { display:flex; gap:.25rem; margin:.2rem 0 .3rem; flex-wrap:wrap; }
  .mdtoolbar button { padding:.12rem .5rem; font-size:.8rem; }
  /* In-place editor: transparent textarea over a highlighted backdrop. Both must
     share identical box metrics so characters line up. */
  .mdwrap { position:relative; }
  .mdta, .mdback {
    font:.85rem/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
    padding:.5rem .6rem; margin:0; border:1px solid var(--line); border-radius:6px;
    box-sizing:border-box; width:100%; min-height:200px;
    white-space:pre-wrap; overflow-wrap:break-word; word-break:break-word; letter-spacing:normal; tab-size:2;
  }
  .mdta { position:relative; display:block; background:transparent; color:transparent; caret-color:var(--fg); resize:vertical; z-index:2; }
  .mdta::selection { background:var(--card-sel); color:transparent; }
  .mdback { position:absolute; inset:0; z-index:1; color:var(--fg); pointer-events:none; overflow:hidden; background:var(--bg); }
  .md-syn { color:var(--muted); opacity:.55; }
  .md-strong { font-weight:700; }
  .md-em { font-style:italic; }
  .md-code { color:var(--warn); }
  .md-link { color:var(--accent); text-decoration:underline; }
  .md-h { color:var(--accent); font-weight:700; }
  .md-quote { color:var(--muted); font-style:italic; }
  @media (max-width:640px) { .grid2 { grid-template-columns:1fr; } }

  /* Calendar mode: a Google-Calendar-style week grid (day columns × hour rows)
     replacing the kanban board while active. Only items with both a start and
     an end appear; multi-day items sit in the all-day band. */
  .calweek { display:flex; flex-direction:column; height:calc(100vh - 96px); }
  .calweek .gutter { flex:0 0 56px; }
  .calnav { display:flex; align-items:center; gap:.3rem; margin-bottom:.5rem; }
  .calnav .range { font-weight:600; margin-left:.5rem; }
  .calnav .arrow { font-size:1.1rem; line-height:1; padding:.15rem .5rem; }

  .calhead { display:flex; }
  .calhead .day { flex:1; text-align:center; padding:.25rem 0 .45rem; border-left:1px solid var(--line); }
  .calhead .day .dow { font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .calhead .day .dom { font-size:1.4rem; line-height:1.7; color:var(--fg); }
  .calhead .day.today .dom { background:var(--accent); color:#fff; border-radius:50%; width:1.9rem; height:1.9rem; display:inline-flex; align-items:center; justify-content:center; line-height:1; }

  .callday { display:flex; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .callday .gutter { font-size:.6rem; color:var(--muted); text-align:right; padding:.2rem .35rem 0 0; }
  .callday .lanes { flex:1; display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:1.35rem; gap:2px; padding:2px 0; min-height:1.5rem; }
  .calspan { --col-color:var(--accent); background:color-mix(in srgb, var(--col-color) 22%, var(--panel)); border-left:3px solid var(--col-color); border-radius:4px; padding:.05rem .4rem; font-size:.72rem; line-height:1.25rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
  .calspan:hover { filter:brightness(1.12); }

  .calbody { flex:1; display:flex; overflow-y:auto; position:relative; }
  .calbody .gutter { position:relative; }
  .calbody .gutter .hourlabel { position:absolute; right:.4rem; font-size:.66rem; color:var(--muted); transform:translateY(-.5em); }
  .caldays { flex:1; display:flex; position:relative; }
  .caldaycol { flex:1; position:relative; border-left:1px solid var(--line); }
  .calhour { position:absolute; left:0; right:0; border-top:1px solid var(--line); pointer-events:none; }
  .calevent { --col-color:var(--accent); position:absolute; box-sizing:border-box; background:color-mix(in srgb, var(--col-color) 22%, var(--panel)); border:1px solid var(--col-color); border-left-width:3px; border-radius:5px; padding:.05rem .3rem; overflow:hidden; cursor:pointer; }
  .calevent:hover { filter:brightness(1.12); }
  .calevent .cn { font-weight:600; font-size:.72rem; line-height:1.15; }
  .calevent .ct { color:var(--muted); font-size:.66rem; }
  .calnow { position:absolute; left:0; right:0; height:0; border-top:2px solid var(--danger); z-index:6; pointer-events:none; }
  .calnow .dot { position:absolute; left:-4px; top:-5px; width:9px; height:9px; border-radius:50%; background:var(--danger); }
  .calselection { position:absolute; left:0; right:0; box-sizing:border-box; background:color-mix(in srgb, var(--accent) 22%, transparent); border-radius:4px; z-index:6; pointer-events:none; }
  .calcursor { position:absolute; left:0; right:0; box-sizing:border-box; background:color-mix(in srgb, var(--accent) 16%, transparent); border:2px solid var(--accent); border-radius:6px; z-index:7; pointer-events:none; }
  .calevent.cursor, .calspan.cursor { box-shadow:0 0 0 2px var(--accent); }
  .calevent.sel, .calspan.sel { background:var(--sel); }
  /* Items overlapping the time cursor are selected: a thick border in a colour
     distinct from both the item's own border and the cursor's accent. */
  .calevent.touch, .calspan.touch { border:3px solid var(--warn); }
  /* Items from hidden (minimized) columns: no fill, dotted outline in the column colour. */
  .calevent.hiddencol { background:transparent; border-style:dotted; }
  .calspan.hiddencol { background:transparent; border:1px dotted var(--col-color); }
  /* Calendar mode takes the full app width (edge-to-edge, no main padding). */
  body.calmode main { padding:0; }
  body.calmode .board { display:block; overflow:visible; }
  body.calmode .calweek { width:100%; height:calc(100vh - 54px); }
</style>
</head>
<body>
<header>
  <h1 id="boardTitle">TODODO</h1>
  <button data-action="switch_board" class="link">boards <kbd>space b</kbd></button>
  <button data-action="new_board">+ board</button>
  <button data-action="open_palette" class="link">palette <kbd>space</kbd></button>
  <button id="calendarBtn" data-action="calendar" class="link">calendar <kbd>space C</kbd></button>
  <button data-action="keybindings" class="link">keys</button>
  <button data-action="themes" class="link">theme</button>
  <button data-action="column_colors" class="link">colors</button>
  <button data-action="settings" class="link">settings</button>
  <button id="editModeBtn" class="link">edit: modal</button>
  <button id="refresh" class="link">refresh</button>
  <span id="status"></span>
</header>
<div id="work">
  <main>
    <div id="board" class="board"></div>
    <div id="conflicts"></div>
  </main>
  <aside id="editpane" hidden></aside>
</div>

<div id="overlay" class="overlay" hidden><div id="modal" class="modal"></div></div>

<script>
/* ---------------- API ---------------- */
const api = {
  async get(path) { const r = await fetch(path); return r.json(); },
  async post(path, body) {
    const r = await fetch(path, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
    return r.json();
  },
  async text(path) { const r = await fetch(path); return r.ok ? r.text() : ""; },
};
const status = (t) => { document.getElementById("status").textContent = t; };

async function waitJob(uuid) {
  for (let i = 0; i < 100; i++) {
    const job = await api.get(`/job?uuid=${uuid}`);
    if (job.status && job.status !== "pending") return job;
    await new Promise(r => setTimeout(r, 30));
  }
  return null;
}
// Enqueue a write without re-rendering (for batching); returns the job.
async function submit(path, body) {
  const { uuid, error } = await api.post(path, body);
  if (error) { status("error: " + error); return null; }
  return waitJob(uuid);
}
async function write(path, body, label) {
  status(label + "…");
  const job = await submit(path, body);
  status(job && job.status === "done" ? "ok" : "error");
  await render();
  return job;
}

/* ---------------- Keybindings ---------------- */
// Leader model: tap the leader key (default Space) to arm command mode, then the
// next key runs the mapped action. Ctrl is reserved for dragging (Ctrl+Arrow).
const DEFAULT_KEYS = {
  leader:" ", open_palette:" ", create:"n", edit:"Enter", delete:"d",
  new_board:"m", delete_board:"M", new_column:"c", switch_board:"b", keybindings:"k",
  view_yaml:"y", search:"f", due_date:"w", themes:"t", column_colors:"o", minimize:"z",
  calendar:"C", kanban:"K", reset_cal_cursor:"Escape", confirm:"Enter", cancel:"Escape",
};
const LEADER = [
  "open_palette", "create", "edit", "delete", "new_board", "delete_board", "new_column",
  "switch_board", "search", "due_date", "minimize", "calendar", "kanban", "view_yaml",
  "keybindings", "themes", "column_colors",
];
const ACTION_LABELS = {
  open_palette:"Command palette", create:"Create item", edit:"Edit item",
  delete:"Delete item(s)", new_board:"New board", delete_board:"Delete board",
  new_column:"New column", switch_board:"Switch board",
  keybindings:"Edit keybindings", view_yaml:"View item JSON", search:"Search items",
  due_date:"Set due date", themes:"Switch theme", column_colors:"Column colors",
  minimize:"Minimize column",
  calendar:"Calendar mode", kanban:"Kanban board", reset_cal_cursor:"Reset time cursor",
};
const MOVE_HELP = [
  ["← ↑ → ↓", "Move cursor between cards"],
  ["Shift + Arrow", "Extend multi-selection"],
  ["Enter", "Open selected item"],
  ["Ctrl + ← →", "Drag item(s) across columns"],
  ["Ctrl + ↑ ↓", "Reorder item in its column"],
];

async function loadKeys() {
  try { return { ...DEFAULT_KEYS, ...(await api.get("/keybindings")) }; }
  catch { return { ...DEFAULT_KEYS }; }
}
async function saveKeys(map) { KEYS = { ...DEFAULT_KEYS, ...(await api.post("/keybindings", map)) }; }
let KEYS = { ...DEFAULT_KEYS };
// Uppercase single letters (e.g. "C" = Shift+C) are shown as-is; everything
// else is lowercased and "Arrow" is stripped.
const keyLabel = (k) => k === " " ? "space"
  : (k.length === 1 && k !== k.toLowerCase() && k === k.toUpperCase()) ? k
  : k.replace(/^Arrow/, "").toLowerCase();

// Business-logic map of when each action is active (loaded from the backend's
// keybinding_contexts.yaml). Actions absent from the map are always active.
let KEY_CONTEXTS = { version: 1, actions: {} };
async function loadKeyContexts() {
  try { KEY_CONTEXTS = await api.get("/keybinding-contexts"); }
  catch { KEY_CONTEXTS = { version: 1, actions: {} }; }
}
// The current app state the context rules are evaluated against: the base view
// mode, every open view (base + modal/pane on top), and the cursor selection.
let openModalView = null;
function openViews() {
  const views = [calendarMode ? "calendar" : "kanban"];
  if (paneItemId) views.push("edit_item");
  if (modalOpen() && openModalView) views.push(openModalView);
  return views;
}
function appState() {
  return {
    app_mode: calendarMode ? "calendar" : "kanban",
    open_views: openViews(),
    cursor_items: selectedItems().map(i => i.id),
  };
}
function actionActive(action) {
  const rule = KEY_CONTEXTS.actions?.[action];
  if (!rule) return true;
  const state = appState();
  const count = state.cursor_items.length;
  if (rule.modes && !rule.modes.includes(state.app_mode)) return false;
  if (rule.selection === "none" && count !== 0) return false;
  if (rule.selection === "one" && count !== 1) return false;
  if (rule.selection === "any" && count < 1) return false;
  if (rule.only_when_views && !rule.only_when_views.every(v => state.open_views.includes(v))) return false;
  if (rule.not_when_views && rule.not_when_views.some(v => state.open_views.includes(v))) return false;
  return true;
}

/* ---------------- State ---------------- */
let boards = [], currentBoardId = null, itemsCache = [];
let cursorId = null;                 // the focused card (null when on an empty column)
let cursorCol = null;                // the focused column (so empty columns are reachable)
let selection = new Set();           // multi-selection (shift)
let dragIds = [];                    // ids currently being drag-and-dropped
let dragCol = null;                  // column name currently being drag-reordered
let conflictsCache = [];             // last-fetched conflicts (repainted without refetch)
let workspace = { current:"", theme:"default", boards:{} };
let themeList = [];
let calendarMode = false;            // when true, the agenda view replaces the kanban board
let appSettings = {};                // cached { key: {value, help} } from /settings
let calCursorStart = null;           // Date — start of the calendar time cursor (fixed-size, movable)
let calCursorEnd = null;             // Date — end of the calendar time cursor
let calSelStart = null;              // Date — start of the swept selection range (grows with Shift)
let calSelEnd = null;                // Date — end of the swept selection range
let calCycleGroup = [];              // item ids captured for lowercase-c cycling within a multi-selection
let calCycleIndex = -1;              // position within calCycleGroup

// Machine-local settings helpers (read from the cached /settings payload).
function calIncrementMinutes() {
  const v = Number(appSettings.calendar_increment_minutes?.value);
  return Number.isFinite(v) && v > 0 ? v : 30;
}
function nowTimezone() { return appSettings.now_timezone?.value || null; }
// A naive "YYYY-MM-DDTHH:MM" string in local time, matching datetime-local inputs.
function toLocalInput(d) {
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
// "now" as a Date whose local (browser) fields equal the wall clock in `tz`, so
// getHours()/getDate() read out the target zone. Built from Intl parts rather
// than reparsing a localized string, so it is correct no matter what timezone
// the browser itself is set to. Falls back to the browser clock when `tz` is
// blank or invalid.
function zonedNow(tz) {
  const now = new Date();
  if (!tz) return now;
  try {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).formatToParts(now).reduce((acc, part) => (acc[part.type] = part.value, acc), {});
    return new Date(Number(parts.year), Number(parts.month) - 1, Number(parts.day),
      Number(parts.hour) % 24, Number(parts.minute), Number(parts.second));
  } catch { return now; }
}
// The IANA timezone the browser reports (shown in Settings so a wrong one is visible).
function browserTimezone() { try { return Intl.DateTimeFormat().resolvedOptions().timeZone || ""; } catch { return ""; } }

/* ---------------- Workspace + themes ---------------- */
async function loadWorkspace() { try { return await api.get("/workspace"); } catch { return workspace; } }
async function saveWorkspace() {
  workspace.current = currentBoardId || "";
  workspace = await api.post("/workspace", workspace);
}
function minimizedCols() { return workspace.boards[currentBoardId]?.minimized || []; }
// Each column gets a theme colour by its position, cycling through the 8 the
// active theme defines (--col1..--col8).
function columnColor(col, board = currentBoard()) {
  const cols = board?.columns || [];
  const idx = cols.indexOf(col);
  return `var(--col${(idx < 0 ? 0 : idx % 8) + 1})`;
}
// Per-workspace overrides of the 8 positional column colours: any non-blank
// entry is pinned onto :root as --colN (winning over the theme); blank entries
// fall back to the theme default.
function applyColumnColors() {
  const overrides = workspace.column_colors || [];
  for (let n = 1; n <= 8; n++) {
    const value = (overrides[n - 1] || "").trim();
    if (value) document.documentElement.style.setProperty(`--col${n}`, value);
    else document.documentElement.style.removeProperty(`--col${n}`);
  }
}
// The colour currently in effect for positional slot n (1..8): the workspace
// override if set, else the active theme's --colN resolved from computed style.
function effectiveColumnColor(n) {
  const override = (workspace.column_colors?.[n - 1] || "").trim();
  if (override) return override;
  return getComputedStyle(document.documentElement).getPropertyValue(`--col${n}`).trim() || "#888888";
}
// A minimized column is shown expanded while the cursor or a selected item is in
// it, so the user can see its contents without un-minimizing it.
function isCollapsed(col) {
  if (!minimizedCols().includes(col)) return false;
  if (focusedColumn() === col) return false;
  return !itemsCache.some(i => selection.has(i.id) && i.column.value === col);
}
function toggleMinimize(col) {
  const state = workspace.boards[currentBoardId] || (workspace.boards[currentBoardId] = { minimized: [] });
  const i = state.minimized.indexOf(col);
  if (i >= 0) state.minimized.splice(i, 1); else state.minimized.push(col);
  paint();              // reflect immediately from cache
  saveWorkspace();      // persist in the background
}
function recordBoardOpened(id) {
  const state = workspace.boards[id] || (workspace.boards[id] = { minimized: [] });
  state.opened = Date.now() / 1000;
}
async function openBoard(id) {
  currentBoardId = id;
  selection.clear(); cursorId = null;
  recordBoardOpened(id);
  await saveWorkspace();

}
async function applyTheme(name) {

  document.getElementById("theme").textContent = css;
  workspace.theme = name;
}

const overlay = document.getElementById("overlay");
const modalEl = document.getElementById("modal");
let modalKeyHandler = null;

function openModal(node, onKey, view = null) {
  modalEl.innerHTML = ""; modalEl.appendChild(node);
  overlay.hidden = false; modalKeyHandler = onKey || null; openModalView = view;
  const focusable = modalEl.querySelector("input, textarea, button, select");
  if (focusable) focusable.focus();
}
function closeModal() { overlay.hidden = true; modalEl.innerHTML = ""; modalKeyHandler = null; openModalView = null; }
const modalOpen = () => !overlay.hidden;
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

function el(tag, props = {}, ...kids) {
  const n = document.createElement(tag);
  Object.assign(n, props);
  for (const k of kids) if (k != null) n.append(k.nodeType ? k : document.createTextNode(k));
  return n;
}

function modalText({ title, label, value = "", multiline = false, placeholder = "", view = null }) {
  return new Promise((resolve) => {
    const input = multiline ? el("textarea", { value, rows: 4, placeholder }) : el("input", { type: "text", value, placeholder });
    const submit_ = () => { closeModal(); resolve(input.value); };
    const cancel = () => { closeModal(); resolve(null); };
    const node = el("div", {}, el("h3", {}, title), el("label", {}, label), input,
      el("div", { className: "row" }, el("button", { className: "link", onclick: cancel }, "Cancel"), el("button", { onclick: submit_ }, "OK")));
    openModal(node, (e) => {
      if (e.key === KEYS.confirm && !multiline) { e.preventDefault(); submit_(); }
      else if (e.key === KEYS.cancel) { e.preventDefault(); cancel(); }
    }, view);
  });
}

function modalConfirm({ title, message, confirmLabel = "Delete" }) {
  return new Promise((resolve) => {
    const done = (v) => { closeModal(); resolve(v); };
    // Buttons: [Cancel, Confirm]; arrow keys move focus, Enter fires the focused one.
    const buttons = [
      el("button", { className: "link", onclick: () => done(false) }, "Cancel"),
      el("button", { onclick: () => done(true) }, confirmLabel),
    ];
    let idx = 0;
    const focus = () => { buttons.forEach((b, i) => b.classList.toggle("btnfocus", i === idx)); buttons[idx].focus(); };
    const node = el("div", {}, el("h3", {}, title), el("div", {}, message),
      el("div", { className: "row" }, ...buttons));
    openModal(node, (e) => {
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); idx = (idx - 1 + buttons.length) % buttons.length; focus(); }
      else if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); idx = (idx + 1) % buttons.length; focus(); }
      else if (e.key === KEYS.confirm) { e.preventDefault(); buttons[idx].click(); }
      else if (e.key === KEYS.cancel) { e.preventDefault(); done(false); }
    });
    focus();
  });
}

// In-place syntax highlighting for the editor: a backdrop that colourises the
// markdown while preserving exact character metrics (monospace), so it lines up
// under a transparent textarea — one pane, edit and see formatting together
// (Obsidian-ish). Never adds/removes visible characters, only span wrappers.
function mdHighlight(src) {
  const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const inline = (h) => h
    .replace(/`([^`]+)`/g, '<span class="md-syn">`</span><span class="md-code">$1</span><span class="md-syn">`</span>')
    .replace(/\*\*([^*]+)\*\*/g, '<span class="md-syn">**</span><span class="md-strong">$1</span><span class="md-syn">**</span>')
    .replace(/(^|[^*])\*([^*]+)\*/g, '$1<span class="md-syn">*</span><span class="md-em">$2</span><span class="md-syn">*</span>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<span class="md-syn">[</span><span class="md-link">$1</span><span class="md-syn">](</span><span class="md-code">$2</span><span class="md-syn">)</span>');
  return String(src || "").split(/\n/).map((line) => {
    let h = inline(esc(line));
    if (/^#{1,6}\s/.test(line)) return `<span class="md-h">${h}</span>`;
    if (/^\s*&gt;\s?/.test(esc(line))) return `<span class="md-quote">${h}</span>`;
    if (/^\s*([-*+]|\d+\.)\s/.test(line)) h = h.replace(/^(\s*)([-*+]|\d+\.)/, '$1<span class="md-syn">$2</span>');
    return h;
  }).join("\n");
}

// Single-pane markdown editor: toolbar + overlay-highlighted textarea.
function markdownEditor(initial) {
  const ta = el("textarea", { value: initial || "", spellcheck: true, className: "mdta" });
  const back = el("div", { className: "mdback", "aria-hidden": "true" });
  const paint = () => { back.innerHTML = mdHighlight(ta.value) + "\n"; };
  const sync = () => { back.scrollTop = ta.scrollTop; back.scrollLeft = ta.scrollLeft; };
  ta.addEventListener("input", () => { paint(); });
  ta.addEventListener("scroll", sync);
  const after = () => { paint(); ta.focus(); ta.dispatchEvent(new Event("input")); };
  const wrap = (pre, post) => {
    const s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
    ta.value = v.slice(0, s) + pre + v.slice(s, e) + post + v.slice(e);
    ta.selectionStart = s + pre.length; ta.selectionEnd = e + pre.length; after();
  };
  const prefix = (p) => {
    const s = ta.selectionStart, v = ta.value, ls = v.lastIndexOf("\n", s - 1) + 1;
    ta.value = v.slice(0, ls) + p + v.slice(ls); after();
  };
  const tb = (label, fn, title) => el("button", { type: "button", title, onclick: fn }, label);
  const toolbar = el("div", { className: "mdtoolbar" },
    tb("B", () => wrap("**", "**"), "bold"),
    tb("i", () => wrap("*", "*"), "italic"),
    tb("H", () => prefix("## "), "heading"),
    tb("• list", () => prefix("- "), "list"),
    tb("1.", () => prefix("1. "), "numbered"),
    tb("code", () => wrap("`", "`"), "inline code"),
    tb("“ ”", () => prefix("> "), "quote"),
    tb("link", () => wrap("[", "](https://)"), "link"));
  paint();
  const root = el("div", {}, toolbar, el("div", { className: "mdwrap" }, back, ta));
  return { root, textarea: ta, get value() { return ta.value; } };
}

// The full item editor: every field except id/order/deleted. Rendered either in
// a modal or in the right-hand pane (workspace.edit_pane) via the same builder.
const toLocal = (iso) => iso ? iso.slice(0, 16) : "";
function buildEditForm(item) {
  const board = currentBoard();
  const description = markdownEditor(item.description.value);
  const f = {
    title: el("input", { type: "text", value: item.title.value }),
    start: el("input", { type: "datetime-local", value: toLocal(item.start.value) }),
    end: el("input", { type: "datetime-local", value: toLocal(item.end.value) }),
    column: el("select", {}),
    board: el("select", {}),
    assigned_to: el("input", { type: "text", value: item.assigned_to.value }),
    report_to: el("input", { type: "text", value: item.report_to.value }),
  };
  for (const b of boards) f.board.append(el("option", { value: b.id, textContent: b.name.value || "(unnamed)", selected: b.id === item.board.value }));
  const cols = (boards.find(b => b.id === (item.board.value || board?.id))?.columns) || board?.columns || [];
  for (const c of cols) f.column.append(el("option", { value: c, textContent: c, selected: c === item.column.value }));
  f.board.onchange = () => {
    const bc = boards.find(b => b.id === f.board.value)?.columns || [];
    f.column.innerHTML = "";
    for (const c of bc) f.column.append(el("option", { value: c, textContent: c }));
  };
  const body = el("div", {},
    el("label", {}, "Title"), f.title,
    el("label", {}, "Description (markdown)"), description.root,
    el("div", { className: "grid2" },
      el("div", {}, el("label", {}, "Start"), f.start),
      el("div", {}, el("label", {}, "End (due)"), f.end),
      el("div", {}, el("label", {}, "Board"), f.board),
      el("div", {}, el("label", {}, "Column"), f.column),
      el("div", {}, el("label", {}, "Assigned to"), f.assigned_to),
      el("div", {}, el("label", {}, "Report to"), f.report_to)));
  const error = el("div", { className: "hint", style: "color:var(--danger)" });
  body.append(error);
  const save = async (close) => {
    // An item's schedule must be complete: both start and end, or neither.
    if (Boolean(f.start.value) !== Boolean(f.end.value)) {
      error.textContent = "Start and end must both be set, or both be empty.";
      return;
    }
    if (f.start.value && f.end.value && f.end.value < f.start.value) {
      error.textContent = "End must be on or after start.";
      return;
    }
    error.textContent = "";
    close();
    const changes = [
      ["title", f.title.value], ["description", description.value],
      ["start", f.start.value], ["end", f.end.value],
      ["column", f.column.value], ["board", f.board.value],
      ["assigned_to", f.assigned_to.value], ["report_to", f.report_to.value],
    ].filter(([field, value]) => value !== (item[field].value || ""));
    if (!changes.length) return;
    status("saving…");
    for (const [field, value] of changes) await submit("/item/edit", { target: item.id, field, value });
    status("ok"); await render();
  };
  return { body, save };
}

let paneItemId = null;
function closePane() {
  paneItemId = null;
  const pane = document.getElementById("editpane");
  pane.hidden = true; pane.innerHTML = "";
  document.body.classList.remove("pane-open");

// Below this width the pane is treated as dragged-off-screen and hidden.
const PANE_MIN_WIDTH = 160;
function paneWidth() {
  const width = Number(workspace.edit_pane_width);
  return Number.isFinite(width) && width > 0 ? width : 400;
}
function applyPaneWidth(px, pane = document.getElementById("editpane")) {
  pane.style.flex = `0 0 ${px}px`;
  pane.style.width = px + "px";
}
// A drag handle on the pane's inner (left) edge. The pane hugs the right of the
// window, so its width is the distance from the cursor to the right edge;
// dragging past PANE_MIN_WIDTH hides the pane entirely.
function attachPaneResizer(pane) {
  const resizer = el("div", { className: "pane-resizer", title: "Drag to resize · drag to the edge to hide" });
  resizer.addEventListener("mousedown", (e) => {
    e.preventDefault();
    resizer.classList.add("dragging");
    document.body.classList.add("pane-resizing");
    const maxWidth = () => Math.round(window.innerWidth * 0.8);
    const onMove = (ev) => applyPaneWidth(Math.max(0, Math.min(window.innerWidth - ev.clientX, maxWidth())), pane);
    const onUp = (ev) => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      resizer.classList.remove("dragging");
      document.body.classList.remove("pane-resizing");
      const width = window.innerWidth - ev.clientX;
      if (width < PANE_MIN_WIDTH) { closePane(); return; }
      const clamped = Math.min(Math.max(width, PANE_MIN_WIDTH), maxWidth());
      workspace.edit_pane_width = clamped;
      applyPaneWidth(clamped, pane);
      saveWorkspace();
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
  pane.append(resizer);
}
function mountPane(item) {
  paneItemId = item.id;
  const { body, save } = buildEditForm(item);
  const pane = document.getElementById("editpane");
  pane.innerHTML = "";
  applyPaneWidth(paneWidth(), pane);
  attachPaneResizer(pane);
  pane.append(
    el("div", { className: "panehead" }, el("strong", {}, "Edit item"), el("button", { className: "link", onclick: closePane }, "✕")),
    body,
    el("div", { className: "row" },
      el("span", { className: "hint", style: "margin-right:auto" }, "Ctrl+Enter to save"),
      el("button", { onclick: () => save(closePane) }, "Save")));
  pane.onkeydown = (e) => {
    if (e.ctrlKey && e.key === "Enter") { e.preventDefault(); save(closePane); }
    else if (e.key === KEYS.cancel) { e.preventDefault(); closePane(); }
  };
  pane.hidden = false;
  document.body.classList.add("pane-open");
  const first = body.querySelector("input, textarea");
  if (first) first.focus();
}

function modalPalette() {
  const list = el("ul", { className: "plist" });
  let idx = 0;
  const rows = LEADER.filter(actionActive).map((action) => {
    const li = el("li", {}, el("span", {}, ACTION_LABELS[action]), el("kbd", {}, keyLabel(KEYS.leader) + " " + keyLabel(KEYS[action])));
    li.onclick = () => { closeModal(); runAction(action); };
    list.append(li);
    return { li, action };
  });
  const highlight = () => rows.forEach((r, i) => r.li.classList.toggle("on", i === idx));
  highlight();
  const help = el("ul", { className: "plist" });
  for (const [keys, desc] of MOVE_HELP) help.append(el("li", { className: "disabled" }, el("span", {}, desc), el("kbd", {}, keys)));
  const node = el("div", {}, el("h3", {}, "Command palette"),
    el("div", { className: "hint" }, `Tap ${keyLabel(KEYS.leader)}, then a key — or click.`), list,
    el("div", { className: "hint" }, "Navigation"), help);
  openModal(node, (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); idx = (idx + 1) % rows.length; highlight(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); idx = (idx - 1 + rows.length) % rows.length; highlight(); }
    else if (e.key === KEYS.confirm) { e.preventDefault(); closeModal(); runAction(rows[idx].action); }
    else if (e.key === KEYS.cancel) { e.preventDefault(); closeModal(); }
  }, "palette");
}

function modalKeybindings() {
  const table = el("table", { className: "kbtable" });
  let capturing = null;
  const render_ = () => {
    table.innerHTML = "";
    for (const action of ["leader", ...LEADER]) {
      const tr = el("tr", { className: capturing === action ? "capturing" : "" });
      const btn = el("button", { className: "link", onclick: () => { capturing = action; render_(); } },
        capturing === action ? "press a key…" : keyLabel(KEYS[action]));
      tr.append(el("td", {}, action === "leader" ? "Leader key" : ACTION_LABELS[action]), el("td", { className: "k" }, btn));
      table.append(tr);
    }
    for (const [keys, desc] of MOVE_HELP) table.append(el("tr", {}, el("td", {}, desc), el("td", { className: "k" }, el("span", {}, keys))));
  };
  render_();
  const reset = () => { saveKeys({ ...DEFAULT_KEYS }).then(render_); };
  const node = el("div", {}, el("h3", {}, "Keybindings"),
    el("div", { className: "hint" }, "Tap the leader, then the action key. Click a key to rebind."), table,
    el("div", { className: "row" }, el("button", { className: "link", onclick: reset }, "Reset defaults"), el("button", { onclick: closeModal }, "Done")));
  openModal(node, (e) => {

function modalThemes() {
  const list = el("ul", { className: "plist" });
  let idx = Math.max(0, themeList.indexOf(workspace.theme));
  const rows = themeList.map((name) => {
    const li = el("li", {}, el("span", {}, name), name === workspace.theme ? el("kbd", {}, "active") : null);
    li.onclick = async () => { await applyTheme(name); await saveWorkspace(); closeModal(); };
    list.append(li); return { li, name };
  });
  const highlight = () => rows.forEach((r, i) => r.li.classList.toggle("on", i === idx));
  highlight();

    el("div", { className: "hint" }, "Files live in userdata/themes/*.css"), list);
  openModal(node, (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); idx = (idx + 1) % rows.length; highlight(); applyTheme(rows[idx].name); }
    else if (e.key === "ArrowUp") { e.preventDefault(); idx = (idx - 1 + rows.length) % rows.length; highlight(); applyTheme(rows[idx].name); }

    else if (e.key === KEYS.cancel) { e.preventDefault(); applyTheme(workspace.theme); closeModal(); }

function toHexColor(color) {
  color = (color || "").trim();
  if (/^#[0-9a-fA-F]{6}$/.test(color)) return color.toLowerCase();
  if (/^#[0-9a-fA-F]{3}$/.test(color)) return "#" + color.slice(1).split("").map(c => c + c).join("").toLowerCase();
  const match = color.match(/rgba?\(([^)]+)\)/);
  if (match) {
    const [r, g, b] = match[1].split(",").map(x => parseInt(x, 10));
    return "#" + [r, g, b].map(v => Math.max(0, Math.min(255, v || 0)).toString(16).padStart(2, "0")).join("");
  }
  return "#888888";
}
// Editor for the 8 positional column colours; edits are saved to the workspace
// as overrides of the active theme's --col1..8.
function modalColumnColors() {
  const board = currentBoard();
  const inputs = [];
  const grid = el("div", { className: "colorgrid" });
  for (let n = 1; n <= 8; n++) {
    const input = el("input", { type: "color", value: toHexColor(effectiveColumnColor(n)) });
    inputs.push(input);
    const users = (board?.columns || []).filter((_, i) => (i % 8) + 1 === n);
    grid.append(el("label", { className: "colorrow" }, input, el("span", {}, `${n}. ${users.length ? users.join(", ") : "—"}`)));
  }
  const save = async () => {
    workspace.column_colors = inputs.map(i => i.value);
    applyColumnColors();
    closeModal();
    status("saving colors…");
    await saveWorkspace();
    status("ok");
    render();
  };
  const reset = () => {
    workspace.column_colors = [];
    applyColumnColors();
    inputs.forEach((input, i) => { input.value = toHexColor(effectiveColumnColor(i + 1)); });
  };
  const node = el("div", {}, el("h3", {}, "Column colors"),
    el("div", { className: "hint" }, "Positional colors cycled across columns 1–8. Saved to your workspace, overriding the theme."),
    grid,
    el("div", { className: "row" },
      el("button", { className: "link", style: "margin-right:auto", onclick: reset }, "Reset to theme"),
      el("button", { className: "link", onclick: closeModal }, "Cancel"),
      el("button", { onclick: save }, "Save")));
  openModal(node, (e) => { if (e.key === KEYS.cancel) { e.preventDefault(); closeModal(); } }, "column_colors");
}

// App settings editor: the defaults applied to a new item's start/end times,
// relative to now. Persisted via GET/POST /settings -> userdata/settings.yaml.
async function modalSettings() {
  // Each setting arrives as { value, help }; help is shown as a hover tooltip.
  const s = await api.get("/settings");
  const val = (key) => s[key]?.value;
  const help = (key) => s[key]?.help || "";
  const field = (key, label, node) => el("div", { title: help(key) }, el("label", { title: help(key) }, label), node);
  const number = (key, min, step) => el("input", { type: "number", value: String(val(key)), min: String(min), step: String(step || 1), title: help(key) });
  const mode = (key) => {
    const sel = el("select", { title: help(key) });
    for (const m of ["ceil", "floor", "none"]) sel.append(el("option", { value: m, textContent: m, selected: m === val(key) }));
    return sel;
  };
  const text = (key, placeholder) => el("input", { type: "text", value: val(key) == null ? "" : String(val(key)), placeholder: placeholder || "", title: help(key) });
  const f = {
    default_start_offset_minutes: number("default_start_offset_minutes", 0),
    default_start_rounding: mode("default_start_rounding"),
